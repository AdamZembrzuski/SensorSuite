name: Firmware Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: project

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build gperf ccache \
            python3-pip python3-venv wget xz-utils

      - name: Cache west workspace
        id: cache-west
        uses: actions/cache@v4
        with:
          path: nrfconnect
          key: west-nrf-sdk-3.1.1
          restore-keys: west-nrf-sdk-

      - name: Initialise west workspace
        if: steps.cache-west.outputs.cache-hit != 'true'
        run: |
          pip3 install west
          west init -m https://github.com/nrfconnect/sdk-nrf \
            --mr v3.1.1 nrfconnect
          cd nrfconnect
          west update
          pip3 install -r zephyr/scripts/requirements.txt
          pip3 install -r nrf/scripts/requirements.txt
          pip3 install -r bootloader/mcuboot/scripts/requirements.txt

      - name: Cache Zephyr SDK toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-0.17.0

      - name: Install Zephyr SDK
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          tar -xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C ~/
          mv ~/zephyr-sdk-0.17.0 ~/zephyr-sdk
          ~/zephyr-sdk/setup.sh -t arm-zephyr-eabi

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-nrf54l15-${{ github.sha }}
          restore-keys: ccache-nrf54l15-

      - name: Copy application into workspace
        run: cp -r project/firmware nrfconnect/app

      - name: Build
        working-directory: nrfconnect
        run: |
          west build app \
            -b nrf54l15dk/nrf54l15/cpuapp/ns \
            -p auto \
            -- \
            -DBOARD_ROOT=$(pwd)/app \
            -DCONF_FILE=prj.conf \
            -DEXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_nrf54l15_cpuapp_ns.overlay"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            nrfconnect/build/zephyr/zephyr.hex
            nrfconnect/build/zephyr/zephyr.elf
          retention-days: 30
