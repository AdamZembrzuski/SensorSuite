name: Firmware Build

on:
  push:
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the SDK installation — saves ~5 min on every run
      - name: Cache nRF Connect SDK + toolchain
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/nrfconnect
            ~/nrfconnect
          key: nrf-sdk-3.1.1
          restore-keys: nrf-sdk-

      - name: Install nRF Connect SDK 3.1.1
        uses: nrfconnect/action-nrf-connect@v1
        with:
          sdk-version: 3.1.1
          toolchain-version: v3.1.1

      - name: West update
        run: west update

      # ccache avoids recompiling unchanged translation units
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-nrf54l15-${{ github.sha }}
          restore-keys: ccache-nrf54l15-

      - name: Configure ccache
        run: |
          sudo apt-get install -y ccache
          ccache --max-size=500M
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Build
        working-directory: firmware
        run: |
          west build \
            -b nrf54l15dk/nrf54l15/cpuapp/ns \
            -p auto \
            -- \
            -DBOARD_ROOT=$(pwd) \
            -DCONF_FILE=prj.conf \
            -DEXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_nrf54l15_cpuapp_ns.overlay"

      # Retain the hex for download from the Actions run page
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            firmware/build/zephyr/zephyr.hex
            firmware/build/zephyr/zephyr.elf
          retention-days: 30
