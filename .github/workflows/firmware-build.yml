name: Firmware Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NCS_VERSION: v3.1.1
  ZEPHYR_SDK_VERSION: 0.17.0

jobs:
  build:
    runs-on: ubuntu-22.04   # pin OS — 'latest' drifts and breaks builds

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: firmware-repo

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache \
            python3-pip python3-venv \
            device-tree-compiler wget xz-utils

      - name: Set up Python venv + west
        run: |
          python3 -m venv ~/.venv
          echo "PATH=$HOME/.venv/bin:$PATH" >> $GITHUB_ENV
          ~/.venv/bin/pip install west

      - name: Cache Zephyr SDK
        id: cache-zephyr-sdk
        uses: actions/cache@v4
        with:
          path: ~/zephyr-sdk
          key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}

      - name: Install Zephyr SDK (arm only)
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${{ env.ZEPHYR_SDK_VERSION }}/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}_linux-x86_64_minimal.tar.xz -C ~/
          mv ~/zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }} ~/zephyr-sdk
          ~/zephyr-sdk/setup.sh -c -t arm-zephyr-eabi

      - name: Cache west workspace
        id: cache-west
        uses: actions/cache@v4
        with:
          path: ncs
          key: ncs-west-${{ env.NCS_VERSION }}

      - name: Initialise west workspace
        if: steps.cache-west.outputs.cache-hit != 'true'
        run: |
          west init -m https://github.com/nrfconnect/sdk-nrf \
            --mr ${{ env.NCS_VERSION }} ncs
          cd ncs
          west update --narrow -o=--depth=1
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt \
                      -r nrf/scripts/requirements.txt \
                      -r bootloader/mcuboot/scripts/requirements.txt

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache"   >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Build
        run: |
          west build \
            -s firmware-repo/firmware \
            -d build \
            -b nrf54l15dk/nrf54l15/cpuapp/ns \
            -p auto \
            -- \
            -DBOARD_ROOT=${{ github.workspace }}/firmware-repo/firmware \
            -DCONF_FILE=prj.conf \
            -DEXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_nrf54l15_cpuapp_ns.overlay" \
            -DCONFIG_COMPILER_OPT="-O2"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.elf
            build/zephyr/.config
          retention-days: 30
