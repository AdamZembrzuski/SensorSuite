name: Firmware Build

on:
  push:
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nrfconnect/sdk-nrf-toolchain:v3.1.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install West
        run: |

      - name: Initialize West
        run: |
          west init -l firmware
          west update
          west zephyr-export
          
          pip3 install -r zephyr/scripts/requirements.txt --break-system-packages || pip3 install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        working-directory: firmware
        run: |
          west build -p always -b nrf54l15dk/nrf54l15/cpuapp/ns -- \
            -DEXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_nrf54l15_cpuapp_ns.overlay" \
            -DCONFIG_SPEED_OPTIMIZATIONS=y

      - name: Archive firmware artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nrf54l15-firmware
          path: |
            firmware/build/zephyr/zephyr.hex
            firmware/build/zephyr/zephyr.bin
            firmware/build/zephyr/merged.hex
