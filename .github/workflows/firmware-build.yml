name: Firmware Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 warnings
  NCS_VERSION: v3.1.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: project

      - name: Install nrfutil
        run: |
          pip install nrfutil
          nrfutil install toolchain-manager

      - name: Cache NCS toolchain
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nrfutil/toolchains
          key: ncs-toolchain-${{ env.NCS_VERSION }}

      - name: Install NCS toolchain
        run: nrfutil toolchain-manager install --ncs-version ${{ env.NCS_VERSION }}

      - name: Cache west workspace
        id: cache-west
        uses: actions/cache@v4
        with:
          path: ncs
          key: ncs-west-${{ env.NCS_VERSION }}

      - name: Initialise west workspace
        if: steps.cache-west.outputs.cache-hit != 'true'
        run: |
          nrfutil toolchain-manager env --ncs-version ${{ env.NCS_VERSION }} -- \
            west init -m https://github.com/nrfconnect/sdk-nrf \
            --mr ${{ env.NCS_VERSION }} ncs
          cd ncs && nrfutil toolchain-manager env --ncs-version ${{ env.NCS_VERSION }} -- \
            west update --narrow -o=--depth=1

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-nrf54l15-${{ github.sha }}
          restore-keys: ccache-nrf54l15-

      - name: Build
        run: |
          nrfutil toolchain-manager env --ncs-version ${{ env.NCS_VERSION }} -- \
            west build \
              -s project/firmware \
              -d build \
              -b nrf54l15dk/nrf54l15/cpuapp/ns \
              -p auto \
              -- \
              -DBOARD_ROOT=${{ github.workspace }}/project/firmware \
              -DCONF_FILE=prj.conf \
              -DEXTRA_DTC_OVERLAY_FILE="boards/nrf54l15dk_nrf54l15_cpuapp_ns.overlay" \
              -DCONFIG_COMPILER_OPT="-O2"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.elf
            build/zephyr/.config
          retention-days: 30
